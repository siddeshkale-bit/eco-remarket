{% extends "base.html" %}

{% block content %}
<style>
    /* MAGIC LINE: Colors the entire screen background, edge to edge with Soft Modern Blue */
    body {
        background-color: #e8f0fe !important; 
    }

    .auth-wrapper {
        min-height: 75vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        border-radius: 1.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(25, 135, 84, 0.1);
        background: #ffffff;
        overflow: hidden;
    }
    
    .form-control-custom {
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 0.75rem;
    }
    
    .form-control-custom:focus {
        background-color: #ffffff;
        border-color: #198754;
        box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.1);
    }

    /* Role Selection Toggle */
    .role-option {
        transition: all 0.3s ease;
        cursor: pointer;
        border: 2px solid #e9ecef !important;
        background-color: #ffffff;
        border-radius: 0.75rem;
    }

    .role-option:hover {
        background-color: #f8fcf9;
    }

    .role-input:checked + .role-label .role-option {
        border-color: #198754 !important;
        background-color: #f0fdf4;
        color: #198754;
    }

    /* Special style for Admin active state */
    .role-input[value="admin"]:checked + .role-label .role-option {
        border-color: #212529 !important;
        background-color: #f8f9fa;
        color: #212529;
    }

    .role-input {
        display: none;
    }

    .password-toggle {
        cursor: pointer;
        z-index: 10;
    }
</style>

<div class="auth-wrapper py-4 animate__animated animate__zoomIn">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card auth-card">
                    
                    <div style="height: 6px; background: linear-gradient(90deg, #198754, #20c997);"></div>

                    <div class="card-body p-4 p-sm-5">
                        
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-3" style="width: 60px; height: 60px;">
                                <i class="bi bi-shield-lock-fill fs-2"></i>
                            </div>
                            <h2 class="text-dark fw-bolder mb-1">Welcome Back</h2>
                            <p class="text-muted small">Log in to manage your Eco Remarket activity.</p>
                        </div>
                        
                        {% if error %}
                        <div class="alert alert-danger text-center small fw-bold rounded-3" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}

                        <form action="/login" method="POST">
                            
                            <div class="form-floating mb-3">
                                <input type="email" name="email" class="form-control form-control-custom" id="email" placeholder="name@example.com" required>
                                <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>Email Address</label>
                            </div>
                            
                            <div class="form-floating mb-4 position-relative">
                                <input type="password" name="password" class="form-control form-control-custom pe-5" id="password" placeholder="Password" required>
                                <label for="password" class="text-muted"><i class="bi bi-key me-2"></i>Password</label>
                                <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 text-muted password-toggle" id="togglePassword"></i>
                            </div>
                            
                            <label class="form-label fw-bold text-dark small text-uppercase mb-3">Log in as:</label>
                            
                            <div class="row g-2 mb-4">
                                <div class="col-4">
                                    <input class="role-input" type="radio" name="role" id="loginReseller" value="reseller" checked>
                                    <label class="role-label w-100" for="loginReseller">
                                        <div class="role-option p-2 text-center fw-bold small">
                                            Reseller
                                        </div>
                                    </label>
                                </div>
                                <div class="col-4">
                                    <input class="role-input" type="radio" name="role" id="loginCreator" value="creator">
                                    <label class="role-label w-100" for="loginCreator">
                                        <div class="role-option p-2 text-center fw-bold small">
                                            Creator
                                        </div>
                                    </label>
                                </div>
                                <div class="col-4">
                                    <input class="role-input" type="radio" name="role" id="loginAdmin" value="admin">
                                    <label class="role-label w-100" for="loginAdmin">
                                        <div class="role-option p-2 text-center fw-bold small">
                                            <i class="bi bi-shield-fill-check me-1"></i> Admin
                                        </div>
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm py-3 mb-3">
                                Sign In <i class="bi bi-box-arrow-in-right ms-2"></i>
                            </button>
                            
                        </form>
                    </div>
                    
                    <div class="card-footer bg-light border-0 text-center py-4" style="background-color: #ffffff !important; border-top: 1px solid #f1f1f1 !important;">
                        <p class="text-muted mb-0 fw-medium">New here? <a href="/register" class="text-success fw-bold text-decoration-none ms-1">Create an account</a></p>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('password');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
</script>
{% endblock %}
