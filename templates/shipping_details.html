{% extends "base.html" %}

{% block content %}
<style>
    body { background-color: #e8f0fe !important; }
    .form-wrapper { background: #ffffff; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05); border: 1px solid rgba(25, 135, 84, 0.1); padding: 3rem; }
    .form-control-custom { background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 0.75rem; padding: 0.75rem 1rem; }
    .form-control-custom:focus { background-color: #ffffff; border-color: #198754; box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.1); }
</style>

<div class="container py-5 animate__animated animate__fadeInUp">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-wrapper">
                
                <div class="text-center mb-5">
                    <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-truck fs-2"></i>
                    </div>
                    <h2 class="fw-bolder text-dark">Reseller Details</h2>
                    <p class="text-muted">Where should we deliver this order?</p>
                </div>

                <form action="/checkout" method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">Reseller Shop Name</label>
                        <input type="text" name="reseller_shop" class="form-control form-control-custom" required placeholder="e.g., My Shop">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small">Contact Number</label>
                        <input type="tel" name="reseller_contact" class="form-control form-control-custom" required placeholder="e.g., +91 9999999999">
                    </div>
                    <div class="mb-5">
                        <label class="form-label fw-bold text-dark small">Shipping Address</label>
                        <textarea name="reseller_address" class="form-control form-control-custom" rows="4" required placeholder="Enter full delivery address..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm py-3">
                        Proceed to Payment <i class="bi bi-credit-card ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
