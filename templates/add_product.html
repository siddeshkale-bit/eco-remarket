{% extends "base.html" %}

{% block content %}
<style>
    body { background-color: #e8f0fe !important; }
    .form-wrapper {
        background: #ffffff; border-radius: 1.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(25, 135, 84, 0.1); padding: 3rem;
    }
    .form-control-custom, .form-select-custom {
        background-color: #f8f9fa; border: 1px solid #e9ecef;
        border-radius: 0.75rem; padding: 0.75rem 1rem;
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="form-wrapper">
                <div class="text-center mb-5">
                    <h2 class="fw-bolder text-dark">Add New Product</h2>
                    <p class="text-muted">Fill in the details to list your product.</p>
                </div>

                <form action="/add_product" method="POST" enctype="multipart/form-data">
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Product Name</label>
                            <input type="text" name="name" class="form-control form-control-custom" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Price (₹)</label>
                            <input type="number" name="price" class="form-control form-control-custom" step="0.01" required>
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Main Category</label>
                            <select name="category" id="mainCategory" class="form-select form-select-custom" required onchange="updateSubCategories()">
                                <option value="" disabled selected>Select Category...</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Toys">Toys</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Sub Category</label>
                            <select name="sub_category" id="subCategory" class="form-select form-select-custom" required>
                                <option value="" disabled selected>Select Sub Category...</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Quantity</label>
                            <input type="number" name="quantity" class="form-control form-control-custom" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small">Shop Name</label>
                            <input type="text" name="shop_name" class="form-control form-control-custom" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small">Upload Image</label>
                        <input type="file" name="photo" class="form-control form-control-custom" accept="image/*" required>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-bold small">Description</label>
                        <textarea name="description" class="form-control form-control-custom" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-warning btn-lg w-100 rounded-pill fw-bold text-white" style="background-color: #f59e0b; border: none;">Publish Product</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // This function runs every time you change the Main Category
    function updateSubCategories() {
        const mainCat = document.getElementById('mainCategory').value;
        const subCatSelect = document.getElementById('subCategory');

        // Clear existing options
        subCatSelect.innerHTML = '<option value="" disabled selected>Select Sub Category...</option>';

        const options = {
            'Electronics': ['Mobile', 'Laptops', 'TV'],
            'Toys': ['Soft toys', 'Puzzles', 'Cars']
        };

        if (options[mainCat]) {
            options[mainCat].forEach(function(sub) {
                let opt = document.createElement('option');
                opt.value = sub;
                opt.innerHTML = sub;
                subCatSelect.appendChild(opt);
            });
        }
    }
</script>
{% endblock %}
