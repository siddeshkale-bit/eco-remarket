{% extends "base.html" %}

{% block content %}
<style>
    /* MAGIC LINE: Colors the entire screen background, edge to edge with Soft Modern Blue */
    body {
        background-color: #e8f0fe !important; 
    }

    .auth-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        border-radius: 1.5rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(25, 135, 84, 0.1);
        background: #ffffff;
        overflow: hidden;
    }
    
    .form-control-custom {
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 0.75rem;
    }
    
    .form-control-custom:focus {
        background-color: #ffffff;
        border-color: #198754;
        box-shadow: 0 0 0 4px rgba(25, 135, 84, 0.1);
    }

    .role-card {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        border: 2px solid #e9ecef !important;
        background-color: #ffffff;
        position: relative;
    }

    .role-card:hover {
        border-color: rgba(25, 135, 84, 0.3) !important;
        background-color: #f8fcf9;
    }

    .role-input:checked + .role-label .role-card {
        border-color: #198754 !important;
        background-color: #f0fdf4;
        box-shadow: 0 10px 20px rgba(25, 135, 84, 0.1);
        transform: translateY(-2px);
    }
    
    .role-check-icon {
        position: absolute;
        top: 10px;
        right: 10px;
        color: #198754;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.3s ease;
    }

    .role-input:checked + .role-label .role-card .role-check-icon {
        opacity: 1;
        transform: scale(1);
    }

    .role-input {
        display: none;
    }

    .password-toggle {
        cursor: pointer;
        z-index: 10;
    }
</style>

<div class="auth-wrapper py-4 animate__animated animate__fadeInUp">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card auth-card">
                    
                    <div style="height: 6px; background: linear-gradient(90deg, #198754, #20c997);"></div>

                    <div class="card-body p-4 p-sm-5">
                        
                        <div class="text-center mb-4">
                            <h2 class="text-dark fw-bolder mb-1">Create an Account</h2>
                            <p class="text-muted small">Join Eco Remarket to start buying and selling.</p>
                        </div>

                        {% if error %}
                        <div class="alert alert-danger text-center small fw-bold rounded-3" role="alert">
                            {{ error }}
                        </div>
                        {% endif %}
                        
                        <form action="/register" method="POST">
                            
                            <div class="form-floating mb-3">
                                <input type="text" name="fullName" class="form-control form-control-custom" id="fullName" placeholder="John Doe" required>
                                <label for="fullName" class="text-muted"><i class="bi bi-person me-2"></i>Full Name</label>
                            </div>
                            
                            <div class="form-floating mb-3">
                                <input type="email" name="email" class="form-control form-control-custom" id="email" placeholder="name@example.com" required>
                                <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>Email Address</label>
                            </div>
                            
                            <div class="form-floating mb-4 position-relative">
                                <input type="password" name="password" class="form-control form-control-custom pe-5" id="password" placeholder="Password" required>
                                <label for="password" class="text-muted"><i class="bi bi-shield-lock me-2"></i>Password</label>
                                <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 text-muted password-toggle" id="togglePassword" style="font-size: 1.2rem;"></i>
                            </div>
                            
                            <label class="form-label fw-bold text-dark small text-uppercase mb-3">I want to join as a:</label>
                            <div class="row g-3 mb-4">
                                
                                <div class="col-6">
                                    <input class="role-input" type="radio" name="role" id="roleCreator" value="creator" checked>
                                    <label class="role-label w-100 m-0" for="roleCreator">
                                        <div class="card role-card rounded-4 p-3 h-100 text-center">
                                            <i class="bi bi-check-circle-fill fs-5 role-check-icon"></i>
                                            <i class="bi bi-shop fs-2 text-success mb-2"></i>
                                            <span class="d-block fw-bold text-dark">Creator</span>
                                            <span class="text-muted" style="font-size: 0.75rem;">Sell my products</span>
                                        </div>
                                    </label>
                                </div>
                                
                                <div class="col-6">
                                    <input class="role-input" type="radio" name="role" id="roleReseller" value="reseller">
                                    <label class="role-label w-100 m-0" for="roleReseller">
                                        <div class="card role-card rounded-4 p-3 h-100 text-center">
                                            <i class="bi bi-check-circle-fill fs-5 role-check-icon"></i>
                                            <i class="bi bi-cart-check fs-2 text-success mb-2"></i>
                                            <span class="d-block fw-bold text-dark">Reseller</span>
                                            <span class="text-muted" style="font-size: 0.75rem;">Buy & resell</span>
                                        </div>
                                    </label>
                                </div>
                                
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100 rounded-pill fw-bold shadow-sm py-3 mb-3">
                                Create Account
                            </button>

                            <p class="text-center text-muted small mb-0">
                                By creating an account, you agree to our <a href="#" class="text-success text-decoration-none">Terms</a> and <a href="#" class="text-success text-decoration-none">Privacy Policy</a>.
                            </p>
                            
                        </form>
                    </div>
                    
                    <div class="card-footer bg-light border-0 text-center py-4" style="background-color: #ffffff !important; border-top: 1px solid #f1f1f1 !important;">
                        <p class="text-muted mb-0 fw-medium">Already have an account? <a href="/login" class="text-success fw-bold text-decoration-none ms-1">Sign in</a></p>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function (e) {
        const passwordInput = document.getElementById('password');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
</script>
{% endblock %}
